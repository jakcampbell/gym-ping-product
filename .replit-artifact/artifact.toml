kind = "web"
previewPath = "/"
title = "Gym Ping"
version = "1.0.0"
id = "artifacts/gym-ping"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22648

[services.development]
run = "pnpm --filter @workspace/gym-ping run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-ping", "run", "build" ]
publicDir = "artifacts/gym-ping/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22648"
BASE_PATH = "/"
